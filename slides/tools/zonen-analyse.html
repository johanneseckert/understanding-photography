<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>05 — Zonenanalyse</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Mono:wght@300;400&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
<style>
  :root{
    --bg:#0c0c0c;--bg2:#141414;--bg3:#1c1c1c;
    --border:#2a2a2a;--border-light:#383838;
    --text:#e8e4de;--text-muted:#6b6660;--text-dim:#9b9590;
    --accent:#c8a97e;--accent-dim:rgba(200,169,126,0.12);
    --white:#f0ece6;
    --mono:'DM Mono',monospace;--serif:'Cormorant Garamond',Georgia,serif;--sans:'DM Sans',sans-serif;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);font-weight:300;display:flex;flex-direction:column}

  /* ── header ── */
  header{
    flex-shrink:0;z-index:200;
    background:rgba(12,12,12,0.97);
    border-bottom:1px solid var(--border);
    padding:0 1.25rem;height:46px;
    display:flex;align-items:center;justify-content:space-between;
  }
  .hdr-title{font-family:var(--serif);font-size:0.95rem;font-weight:300;color:var(--text-dim);text-align:center}
  .hdr-title span{color:var(--accent)}
  .back-link{font-family:var(--mono);font-size:0.62rem;letter-spacing:0.1em;color:var(--text-muted);text-decoration:none;transition:color 0.15s;min-width:80px}
  .back-link:hover{color:var(--accent)}
  .hdr-num{font-family:var(--mono);font-size:0.62rem;letter-spacing:0.12em;color:var(--text-muted);min-width:80px;text-align:right}

  /* ── app shell ── */
  .app-shell{flex:1;display:flex;overflow:hidden;min-height:0;padding:0.6rem;gap:0}

  /* ── left column ── */
  .col-left{flex:1;min-width:0;display:flex;flex-direction:column;gap:0.4rem;overflow:hidden}

  .canvas-container{
    flex:1;min-height:0;
    position:relative;
    border:1px solid var(--border);border-radius:4px;overflow:hidden;
    background:#111;cursor:crosshair;
  }
  #p5-canvas-holder{width:100%;height:100%}
  #p5-canvas-holder canvas{display:block!important}

  /* probe overlay */
  .probe{position:absolute;pointer-events:none;display:none;z-index:10}
  .probe-inner{
    background:rgba(0,0,0,0.82);border:1px solid var(--accent);border-radius:3px;
    padding:0.5rem 0.75rem;font-family:var(--mono);font-size:0.68rem;color:var(--white);
    letter-spacing:0.04em;white-space:nowrap;transform:translate(12px,-50%);
  }
  .probe-zone-num{font-family:var(--serif);font-size:1.4rem;color:var(--accent);line-height:1}
  .probe-lum{color:var(--text-muted);font-size:0.6rem}
  .probe-name{color:var(--text-dim);font-size:0.65rem;margin-top:2px}

  .mode-badge{
    position:absolute;top:10px;right:10px;
    font-family:var(--mono);font-size:0.6rem;letter-spacing:0.12em;text-transform:uppercase;
    background:rgba(0,0,0,0.7);color:var(--accent);padding:3px 9px;border-radius:2px;pointer-events:none;
  }

  /* status bar */
  .status-bar{
    flex-shrink:0;
    display:flex;gap:1.5rem;align-items:center;
    font-family:var(--mono);font-size:0.63rem;color:var(--text-muted);letter-spacing:0.06em;
    padding:0.3rem 0.5rem;
    background:var(--bg2);border:1px solid var(--border);border-radius:3px;
  }
  .status-bar .val{color:var(--accent)}
  .status-bar .sep{color:var(--border-light)}

  /* ── splitter ── */
  .splitter{
    width:5px;flex-shrink:0;cursor:col-resize;
    background:var(--border);margin:0 0.35rem;border-radius:3px;
    transition:background 0.15s;position:relative;
  }
  .splitter:hover,.splitter.dragging{background:var(--accent)}
  .splitter::after{
    content:'⋮';position:absolute;top:50%;left:50%;
    transform:translate(-50%,-50%);
    color:var(--text-muted);font-size:12px;pointer-events:none;
  }

  /* ── right column ── */
  .col-right{
    width:320px;min-width:220px;max-width:560px;flex-shrink:0;
    display:flex;flex-direction:column;gap:0.4rem;overflow:hidden;
  }

  /* ── collapsible panels ── */
  .panel-section{
    background:var(--bg2);border:1px solid var(--border);border-radius:4px;
    display:flex;flex-direction:column;min-height:0;flex-shrink:0;
  }
  .panel-section.grows{flex:1;min-height:0}
  .panel-hdr{
    height:30px;padding:0 0.75rem;flex-shrink:0;
    display:flex;align-items:center;justify-content:space-between;
    font-family:var(--mono);font-size:0.58rem;letter-spacing:0.1em;text-transform:uppercase;
    color:var(--text-muted);cursor:pointer;user-select:none;
    border-bottom:1px solid var(--border);transition:color 0.15s;
  }
  .panel-hdr:hover{color:var(--accent)}
  .panel-hdr.collapsed{border-bottom:none}
  .toggle-arrow{font-size:0.65rem;color:var(--text-muted)}
  .panel-body{padding:0.65rem 0.75rem;overflow:hidden}
  .panel-body.scrollable{overflow-y:auto;flex:1;min-height:0}
  .panel-body.hidden{display:none}

  /* ── controls inside right panel ── */
  .ctrl-group{margin-bottom:0.55rem}
  .ctrl-group:last-child{margin-bottom:0}
  .label{font-family:var(--mono);font-size:0.58rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-muted);display:block;margin-bottom:0.4rem}
  .btn-row{display:flex;gap:0.3rem;flex-wrap:wrap}

  .img-btn,.mode-btn{
    background:var(--bg3);border:1px solid var(--border);border-radius:3px;
    color:var(--text-dim);font-family:var(--mono);font-size:0.62rem;
    letter-spacing:0.04em;padding:0.35rem 0.6rem;cursor:pointer;transition:all 0.15s;
  }
  .img-btn:hover,.mode-btn:hover{border-color:var(--accent);color:var(--accent)}
  .img-btn.active,.mode-btn.active{border-color:var(--accent);color:var(--accent);background:var(--accent-dim)}
  .img-btn input{display:none}

  /* contrast slider */
  .contrast-row{display:flex;align-items:center;gap:0.6rem;margin-top:0.55rem}
  .contrast-row .bl{font-family:var(--mono);font-size:0.58rem;color:var(--text-muted);letter-spacing:0.06em;white-space:nowrap}
  .contrast-row input{flex:1}
  input[type=range]{-webkit-appearance:none;appearance:none;height:3px;background:var(--border-light);border-radius:2px;outline:none;cursor:pointer}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;border-radius:50%;background:var(--accent);cursor:pointer}

  /* histogram */
  .hist-comp-row{display:flex;align-items:center;justify-content:flex-end;margin-bottom:0.4rem}
  .hist-comp-label{display:flex;align-items:center;gap:0.4rem;cursor:pointer;user-select:none}
  .hist-comp-label input{accent-color:var(--accent);width:12px;height:12px;cursor:pointer}
  .hist-comp-label span{font-family:var(--mono);font-size:0.58rem;letter-spacing:0.06em;color:var(--text-muted)}
  .hist-wrap{position:relative}
  .hist-cursor{
    position:absolute;top:0;bottom:0;width:1px;
    pointer-events:none;display:none;
    background:rgba(255,255,255,0.55);
  }
  #histCanvas{display:block;width:100%;border-radius:2px}

  /* zone legend */
  .zone-legend{display:flex;flex-direction:column;gap:0}
  .zl-item{
    display:flex;align-items:center;gap:0.6rem;padding:0.28rem 0;
    border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.15s;
    border-radius:2px;padding-left:0.3rem;
  }
  .zl-item:hover{background:var(--accent-dim)}
  .zl-item:last-child{border-bottom:none}
  .zl-swatch{width:16px;height:16px;border-radius:2px;flex-shrink:0;border:1px solid rgba(255,255,255,0.06)}
  .zl-gray{width:16px;height:16px;border-radius:2px;flex-shrink:0;border:1px solid rgba(255,255,255,0.06)}
  .zl-num{font-family:var(--serif);font-size:0.9rem;color:var(--text);min-width:18px}
  .zl-name{font-size:0.7rem;color:var(--text-dim);flex:1}
  .zl-pct{font-family:var(--mono);font-size:0.58rem;color:var(--text-muted)}
  .zone-stat-bar{height:2px;border-radius:2px;margin-top:2px;background:var(--accent);transition:width 0.6s ease}
</style>
</head>
<body>

<header>
  <a class="back-link" href="../index.html">← Übersicht</a>
  <div class="hdr-title">Photoclub Reutlingen — <span>Zonenanalyse</span></div>
  <div class="hdr-num">05 — ZONENANALYSE</div>
</header>

<div class="app-shell">

  <!-- ── LEFT: canvas ── -->
  <div class="col-left">
    <div class="canvas-container" id="canvasContainer">
      <div id="p5-canvas-holder"></div>
      <div class="probe" id="probe">
        <div class="probe-inner">
          <div class="probe-zone-num" id="probeZone">V</div>
          <div class="probe-name" id="probeName">Mittleres Grau</div>
          <div class="probe-lum" id="probeLum">Luminanz: 128</div>
        </div>
      </div>
      <div class="mode-badge" id="modeBadge">ZONEN-HEATMAP</div>
    </div>
    <div class="status-bar">
      <span>Zone: <span class="val" id="statZone">—</span></span>
      <span class="sep">|</span>
      <span>Luminanz: <span class="val" id="statLum">—</span></span>
      <span class="sep">|</span>
      <span>RGB: <span class="val" id="statRGB">—</span></span>
      <span class="sep">|</span>
      <span>Ø <span class="val" id="statAvg">—</span></span>
    </div>
  </div>

  <div class="splitter" id="splitter"></div>

  <!-- ── RIGHT: panels ── -->
  <div class="col-right" id="colRight">

    <!-- Controls -->
    <div class="panel-section">
      <div class="panel-hdr" onclick="togglePanel(this)">
        Einstellungen <span class="toggle-arrow">▾</span>
      </div>
      <div class="panel-body">
        <div class="ctrl-group">
          <span class="label">Foto</span>
          <div class="btn-row">
            <button class="img-btn active" onclick="loadPreset(0,this)">Stadtpanorama</button>
            <button class="img-btn" onclick="loadPreset(1,this)">Portrait</button>
            <button class="img-btn" onclick="loadPreset(2,this)">Landschaft</button>
            <label class="img-btn" style="cursor:pointer">Eigenes Bild<input type="file" accept="image/*" onchange="loadUserFile(this)"></label>
          </div>
        </div>
        <div class="ctrl-group">
          <span class="label">Ansicht</span>
          <div class="btn-row">
            <button class="mode-btn" id="btn-color" onclick="setMode('color',this)">Farbe</button>
            <button class="mode-btn" id="btn-bw" onclick="setMode('bw',this)">S/W</button>
            <button class="mode-btn active" id="btn-heat" onclick="setMode('heat',this)">Zonen-Heatmap</button>
          </div>
          <div class="contrast-row" id="contrastRow" style="display:none">
            <span class="bl">Kontrast</span>
            <span class="bl">−100</span>
            <input type="range" id="contrastSlider" min="-100" max="100" value="0" oninput="updateContrast()">
            <span class="bl">+100</span>
            <span style="font-family:var(--mono);font-size:0.65rem;color:var(--accent);min-width:32px;text-align:right" id="contrastVal">0</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Histogram -->
    <div class="panel-section">
      <div class="panel-hdr" onclick="togglePanel(this)">
        Histogramm <span class="toggle-arrow">▾</span>
      </div>
      <div class="panel-body">
        <div class="hist-comp-row">
          <label class="hist-comp-label">
            <input type="checkbox" id="compensateCheck" onchange="toggleCompensate()">
            <span>Extremwerte kompensieren</span>
          </label>
        </div>
        <div class="hist-wrap" id="histWrap">
          <canvas id="histCanvas" height="110"></canvas>
          <div class="hist-cursor" id="histCursor"></div>
        </div>
      </div>
    </div>

    <!-- Zone legend -->
    <div class="panel-section grows">
      <div class="panel-hdr" onclick="togglePanel(this)">
        Zonenverteilung <span class="toggle-arrow">▾</span>
      </div>
      <div class="panel-body scrollable">
        <div class="zone-legend" id="zoneLegend"></div>
      </div>
    </div>

  </div><!-- /col-right -->
</div><!-- /app-shell -->

<script>
// ─── ZONE DATA ──────────────────────────────────────────────────────────
const ZONE_NAMES = [
  'Reines Schwarz','Fast Schwarz','Tiefe Schatten','Untere Mitteltöne',
  'Dunklere Mitteltöne','Mittleres Grau','Helle Mitteltöne',
  'Helles Grau','Sehr helle Töne','Fast Weiß','Reines Weiß'
];
const ZONE_ROMANS = ['0','I','II','III','IV','V','VI','VII','VIII','IX','X'];

const ZONE_HEAT = [
  [10,  15, 120],
  [20,  60, 200],
  [20, 130, 230],
  [20, 190, 190],
  [30, 190, 100],
  [80, 210,  30],
  [180,220,  10],
  [240,170,   0],
  [240, 90,   0],
  [210,  20,  10],
  [140,   0,  10],
];

const IMAGES = [
  'https://images.unsplash.com/photo-1477959858617-67f85cf4f1df?w=900&q=80&fit=crop',
  'https://images.unsplash.com/photo-1531746020798-e6953c6e8e04?w=900&q=80&fit=crop',
  'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=900&q=80&fit=crop',
];

function getLuminance(r,g,b){ return 0.2126*r + 0.7152*g + 0.0722*b; }
function getZone(lum){ return Math.min(10, Math.floor(lum/256*11)); }
function applyContrast(lum, c) {
  if (c === 0) return lum;
  const cv = c * 2.55;
  const factor = (259 * (cv + 255)) / (255 * (259 - cv));
  return Math.max(0, Math.min(255, factor * (lum - 128) + 128));
}

// ─── STATE ──────────────────────────────────────────────────────────────
let sourceImg = null;
let imgPixels = null;
let imgW=0, imgH=0;
let renderMode = 'heat';
let contrastValue = 0;
let histogram = new Array(256).fill(0);
let zoneCounts = new Array(11).fill(0);
let avgLum = 128;
let p5inst = null;
let needsRedraw = true;
let canvasDisplayW = 800;
let canvasDisplayH = 500;
let cursorZone = -1;
let scaledImgW = 0, scaledImgH = 0;
let offsetX = 0, offsetY = 0;

// ─── P5 SKETCH ──────────────────────────────────────────────────────────
const sketch = function(p) {
  p.setup = function() {
    const container = document.getElementById('canvasContainer');
    canvasDisplayW = container.clientWidth || 800;
    canvasDisplayH = container.clientHeight || 500;
    const cnv = p.createCanvas(canvasDisplayW, canvasDisplayH);
    cnv.parent('p5-canvas-holder');
    p.noLoop();
    p.pixelDensity(window.devicePixelRatio||1);
    p.noStroke();
    loadImageURL(IMAGES[0]);
  };

  p.draw = function() {
    if (!needsRedraw) return;
    needsRedraw = false;
    p.background(20);

    if (!imgPixels || imgW === 0) {
      p.fill(40); p.rect(0,0,canvasDisplayW,canvasDisplayH);
      p.fill(100); p.textFont('DM Sans,sans-serif'); p.textSize(13);
      p.textAlign(p.CENTER, p.CENTER);
      p.text('Bild wird geladen…', canvasDisplayW/2, canvasDisplayH/2);
      return;
    }

    const scale = Math.min(canvasDisplayW/imgW, canvasDisplayH/imgH);
    scaledImgW = Math.round(imgW*scale);
    scaledImgH = Math.round(imgH*scale);
    offsetX = Math.round((canvasDisplayW-scaledImgW)/2);
    offsetY = Math.round((canvasDisplayH-scaledImgH)/2);

    p.loadPixels();
    const d = p.pixels;

    for (let sy=0; sy<canvasDisplayH; sy++) {
      for (let sx=0; sx<canvasDisplayW; sx++) {
        const ix = Math.floor((sx-offsetX)/scale);
        const iy = Math.floor((sy-offsetY)/scale);
        const pi = (sy*canvasDisplayW+sx)*4;

        if (ix<0||iy<0||ix>=imgW||iy>=imgH) {
          d[pi]=20;d[pi+1]=20;d[pi+2]=20;d[pi+3]=255;
          continue;
        }

        const si=(iy*imgW+ix)*4;
        const r=imgPixels[si], g=imgPixels[si+1], b=imgPixels[si+2];
        const lum=getLuminance(r,g,b);
        const zone=getZone(lum);

        if (renderMode==='color') {
          d[pi]=r;d[pi+1]=g;d[pi+2]=b;d[pi+3]=255;
        } else if (renderMode==='bw') {
          const l=Math.round(applyContrast(lum, contrastValue));
          d[pi]=l;d[pi+1]=l;d[pi+2]=l;d[pi+3]=255;
        } else {
          const hc=ZONE_HEAT[zone];
          d[pi]=hc[0];d[pi+1]=hc[1];d[pi+2]=hc[2];d[pi+3]=255;
        }
      }
    }
    p.updatePixels();

    if (cursorZone>=0) {
      const mx=p.mouseX, my=p.mouseY;
      if (mx>=offsetX&&mx<=offsetX+scaledImgW&&my>=offsetY&&my<=offsetY+scaledImgH) {
        const hc=ZONE_HEAT[cursorZone];
        p.noFill();
        p.stroke(hc[0],hc[1],hc[2],200);
        p.strokeWeight(2);
        p.ellipse(mx,my,22,22);
        p.noStroke();
      }
    }
  };

  p.mouseMoved = function() { updateProbe(p.mouseX, p.mouseY); };
  p.mouseDragged = function() { updateProbe(p.mouseX, p.mouseY); };
  p.mouseOut = function() {
    document.getElementById('probe').style.display='none';
    document.getElementById('histCursor').style.display='none';
    cursorZone=-1;
    document.getElementById('statZone').textContent='—';
    document.getElementById('statLum').textContent='—';
    document.getElementById('statRGB').textContent='—';
    needsRedraw=true;
    p.redraw();
  };
};

function updateProbe(mx,my) {
  if (!imgPixels||imgW===0) return;
  const ix=Math.floor((mx-offsetX)/((scaledImgW||1)/(imgW||1)));
  const iy=Math.floor((my-offsetY)/((scaledImgH||1)/(imgH||1)));
  if (ix<0||iy<0||ix>=imgW||iy>=imgH) {
    document.getElementById('probe').style.display='none';
    document.getElementById('histCursor').style.display='none';
    cursorZone=-1;
    p5inst.redraw();
    return;
  }
  const si=(iy*imgW+ix)*4;
  const r=imgPixels[si],g=imgPixels[si+1],b=imgPixels[si+2];
  const lum=getLuminance(r,g,b);
  const zone=getZone(lum);

  cursorZone=zone;
  const probe=document.getElementById('probe');
  probe.style.display='block';
  probe.style.left=mx+'px';
  probe.style.top=my+'px';
  document.getElementById('probeZone').textContent=ZONE_ROMANS[zone];
  document.getElementById('probeName').textContent=ZONE_NAMES[zone];
  document.getElementById('probeLum').textContent='Luminanz: '+Math.round(lum);

  document.getElementById('statZone').textContent='Zone '+ZONE_ROMANS[zone]+' — '+ZONE_NAMES[zone];
  document.getElementById('statLum').textContent=Math.round(lum)+' / 255';
  document.getElementById('statRGB').textContent=r+' · '+g+' · '+b;

  // Histogram cursor
  const histCanvas=document.getElementById('histCanvas');
  const histCursor=document.getElementById('histCursor');
  const hcw=histCanvas.clientWidth||histCanvas.width;
  const hc=ZONE_HEAT[zone];
  histCursor.style.display='block';
  histCursor.style.left=Math.round(lum/255*hcw)+'px';
  histCursor.style.background=`rgba(${hc[0]},${hc[1]},${hc[2]},0.85)`;

  needsRedraw=true;
  p5inst.redraw();
}

// ─── CANVAS RESIZE ───────────────────────────────────────────────────────
function resizeCanvas() {
  if (!p5inst) return;
  const container = document.getElementById('canvasContainer');
  const w = container.clientWidth;
  const h = container.clientHeight;
  if (w < 10 || h < 10) return;
  canvasDisplayW = w;
  canvasDisplayH = h;
  p5inst.resizeCanvas(w, h);
  needsRedraw = true;
  p5inst.redraw();
}

// ─── IMAGE LOADING ───────────────────────────────────────────────────────
function loadImageURL(url) {
  needsRedraw=true;
  const img=new Image();
  img.crossOrigin='anonymous';
  img.onload=()=>{
    const maxD=900;
    const scale=Math.min(1,maxD/Math.max(img.width,img.height));
    imgW=Math.round(img.width*scale);
    imgH=Math.round(img.height*scale);
    const off=document.createElement('canvas');
    off.width=imgW;off.height=imgH;
    const ctx=off.getContext('2d');
    ctx.drawImage(img,0,0,imgW,imgH);
    const data=ctx.getImageData(0,0,imgW,imgH);
    imgPixels=data.data;
    computeStats();
    if (p5inst) {needsRedraw=true;p5inst.redraw();}
  };
  img.onerror=()=>{
    imgW=800;imgH=500;
    const off=document.createElement('canvas');
    off.width=imgW;off.height=imgH;
    const ctx=off.getContext('2d');
    const sky=ctx.createLinearGradient(0,0,0,imgH*0.55);
    sky.addColorStop(0,'#1a3a6a');sky.addColorStop(1,'#7aaecc');
    ctx.fillStyle=sky;ctx.fillRect(0,0,imgW,imgH*0.55);
    const gnd=ctx.createLinearGradient(0,imgH*0.55,0,imgH);
    gnd.addColorStop(0,'#5a8040');gnd.addColorStop(1,'#3a5a28');
    ctx.fillStyle=gnd;ctx.fillRect(0,imgH*0.55,imgW,imgH*0.45);
    const data=ctx.getImageData(0,0,imgW,imgH);
    imgPixels=data.data;
    computeStats();
    if(p5inst){needsRedraw=true;p5inst.redraw();}
  };
  img.src=url;
  if(p5inst){needsRedraw=true;p5inst.redraw();}
}

function computeStats() {
  histogram=new Array(256).fill(0);
  zoneCounts=new Array(11).fill(0);
  let sumLum=0;
  const total=(imgPixels.length/4);
  for(let i=0;i<imgPixels.length;i+=4){
    const r=imgPixels[i],g=imgPixels[i+1],b=imgPixels[i+2];
    const rawLum=getLuminance(r,g,b);
    const lum=renderMode==='bw' ? applyContrast(rawLum, contrastValue) : rawLum;
    const li=Math.min(255,Math.round(lum));
    histogram[li]++;
    zoneCounts[getZone(lum)]++;
    sumLum+=lum;
  }
  avgLum=Math.round(sumLum/total);
  document.getElementById('statAvg').textContent='Zone '+ZONE_ROMANS[getZone(avgLum)]+' (Ø '+avgLum+')';
  drawHistogram();
  buildZoneLegend();
}

// ─── HISTOGRAM ───────────────────────────────────────────────────────────
let compensate = false;

function toggleCompensate(){
  compensate = document.getElementById('compensateCheck').checked;
  drawHistogram();
}

function drawHistogram(){
  const canvas=document.getElementById('histCanvas');
  const wrap=document.getElementById('histWrap');
  const dpr=window.devicePixelRatio||1;
  const w=wrap.clientWidth||260;
  const h=canvas.clientHeight||110;
  canvas.width=Math.round(w*dpr);
  canvas.height=Math.round(h*dpr);
  canvas.style.width=w+'px';
  canvas.style.height=h+'px';
  const ctx=canvas.getContext('2d');
  ctx.scale(dpr,dpr);
  ctx.clearRect(0,0,w,h);

  const chartH=h-14; // h is CSS pixels, ctx is scaled
  const barW=Math.max(1,Math.floor(w/256));
  const total=histogram.reduce((a,b)=>a+b,0)||1;

  const innerMax=compensate ? Math.max(...histogram.slice(1,255),1) : Math.max(...histogram,1);
  const max=innerMax*0.85;

  for(let z=0;z<11;z++){
    const x0=Math.round(z/11*w), x1=Math.round((z+1)/11*w);
    const hc=ZONE_HEAT[z];
    ctx.fillStyle=`rgba(${hc[0]},${hc[1]},${hc[2]},0.12)`;
    ctx.fillRect(x0,0,x1-x0,chartH);
  }

  for(let i=0;i<256;i++){
    const cnt=histogram[i]||0;
    if(!cnt) continue;
    const x=Math.round(i/256*w);
    const zone=getZone(i);
    const hc=ZONE_HEAT[zone];
    const isExtreme=compensate&&(i===0||i===255);

    if(isExtreme){
      ctx.fillStyle=`rgba(${hc[0]},${hc[1]},${hc[2]},0.35)`;
      ctx.fillRect(x,0,barW,chartH);
      ctx.save();
      ctx.beginPath();ctx.rect(x,0,barW,chartH);ctx.clip();
      ctx.strokeStyle=`rgba(${hc[0]},${hc[1]},${hc[2]},0.6)`;
      ctx.lineWidth=1;
      for(let y=-chartH;y<chartH+barW;y+=5){
        ctx.beginPath();ctx.moveTo(x+y,0);ctx.lineTo(x+y+chartH,chartH);ctx.stroke();
      }
      ctx.restore();
    } else {
      const bh=Math.min(chartH,(cnt/max)*chartH);
      ctx.fillStyle=`rgba(${hc[0]},${hc[1]},${hc[2]},0.85)`;
      ctx.fillRect(x,chartH-bh,barW,bh);
    }
  }

  ctx.strokeStyle='rgba(200,169,126,0.45)';
  ctx.lineWidth=1;
  for(let z=1;z<=10;z++){
    const x=Math.round(z/11*w);
    ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,chartH);ctx.stroke();
  }

  ctx.font='8px DM Mono, monospace';
  ctx.fillStyle='rgba(107,102,96,0.9)';
  ctx.textAlign='center';
  for(let z=0;z<11;z++){
    ctx.fillText(ZONE_ROMANS[z],Math.round((z+0.5)/11*w),h-2);
  }

  const avgX=Math.round(avgLum/256*w);
  ctx.strokeStyle='rgba(200,169,126,0.9)';
  ctx.lineWidth=1.5;
  ctx.setLineDash([4,3]);
  ctx.beginPath();ctx.moveTo(avgX,0);ctx.lineTo(avgX,chartH);ctx.stroke();
  ctx.setLineDash([]);
  // Average label
  ctx.font='bold 8px DM Mono, monospace';
  ctx.fillStyle='rgba(200,169,126,0.9)';
  ctx.textAlign = avgX > w*0.6 ? 'right' : 'left';
  ctx.fillText('Ø '+ZONE_ROMANS[getZone(avgLum)], avgX + (avgX > w*0.6 ? -4 : 4), 10);

  const clip0=histogram[0]/total*100;
  const clip255=histogram[255]/total*100;
  ctx.font='bold 8px DM Mono, monospace';
  const hc0=ZONE_HEAT[0],hc10=ZONE_HEAT[10];
  if(clip0>0.05){
    ctx.textAlign='left';
    ctx.fillStyle=`rgba(${hc0[0]},${hc0[1]},${hc0[2]},0.9)`;
    ctx.fillText(clip0.toFixed(1)+'%',3,10);
  }
  if(clip255>0.05){
    ctx.textAlign='right';
    ctx.fillStyle=`rgba(${hc10[0]},${hc10[1]},${hc10[2]},0.9)`;
    ctx.fillText(clip255.toFixed(1)+'%',w-3,10);
  }
}

// ─── ZONE LEGEND ─────────────────────────────────────────────────────────
function buildZoneLegend(){
  const legend=document.getElementById('zoneLegend');
  legend.innerHTML='';
  const total=zoneCounts.reduce((a,b)=>a+b,0)||1;
  const maxCount=Math.max(...zoneCounts)||1;
  ZONE_ROMANS.forEach((rom,i)=>{
    const pct=(zoneCounts[i]/total*100).toFixed(1);
    const gv=Math.round(i/10*255);
    const hc=ZONE_HEAT[i];
    legend.innerHTML+=`
      <div class="zl-item">
        <div class="zl-swatch" style="background:rgb(${hc[0]},${hc[1]},${hc[2]})"></div>
        <div class="zl-gray" style="background:rgb(${gv},${gv},${gv})"></div>
        <span class="zl-num">${rom}</span>
        <div style="flex:1">
          <div class="zl-name">${ZONE_NAMES[i]}</div>
          <div class="zone-stat-bar" style="width:${(zoneCounts[i]/maxCount*100).toFixed(1)}%;background:rgb(${hc[0]},${hc[1]},${hc[2]})"></div>
        </div>
        <span class="zl-pct">${pct}%</span>
      </div>`;
  });
}

// ─── CONTROLS ────────────────────────────────────────────────────────────
function setMode(mode,btn){
  renderMode=mode;
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const labels={color:'FARBE',bw:'SCHWARZ-WEISS',heat:'ZONEN-HEATMAP'};
  document.getElementById('modeBadge').textContent=labels[mode];
  document.getElementById('contrastRow').style.display=mode==='bw'?'flex':'none';
  needsRedraw=true;
  computeStats();
  p5inst.redraw();
}

function updateContrast(){
  contrastValue=+document.getElementById('contrastSlider').value;
  const v=contrastValue;
  document.getElementById('contrastVal').textContent=(v>0?'+':'')+v;
  needsRedraw=true;
  computeStats();
  p5inst.redraw();
}

function loadPreset(idx,btn){
  document.querySelectorAll('.img-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  imgPixels=null;imgW=0;imgH=0;
  contrastValue=0;
  document.getElementById('contrastSlider').value=0;
  document.getElementById('contrastVal').textContent='0';
  loadImageURL(IMAGES[idx]);
}

function loadUserFile(input){
  const file=input.files[0];if(!file)return;
  const url=URL.createObjectURL(file);
  document.querySelectorAll('.img-btn').forEach(b=>b.classList.remove('active'));
  imgPixels=null;imgW=0;imgH=0;
  loadImageURL(url);
}

// ─── PANEL COLLAPSE ───────────────────────────────────────────────────────
function togglePanel(hdr){
  const body=hdr.nextElementSibling;
  const arrow=hdr.querySelector('.toggle-arrow');
  const collapsed=body.classList.toggle('hidden');
  hdr.classList.toggle('collapsed', collapsed);
  if(arrow) arrow.textContent=collapsed?'▸':'▾';
  if(!collapsed) {
    // re-draw histogram when reopened
    requestAnimationFrame(()=>{ if(imgPixels) drawHistogram(); });
  }
}

// ─── SPLITTER DRAG ────────────────────────────────────────────────────────
(function(){
  const splitter=document.getElementById('splitter');
  const colRight=document.getElementById('colRight');
  let dragging=false, startX=0, startW=0;
  splitter.addEventListener('mousedown',e=>{
    dragging=true; startX=e.clientX; startW=colRight.offsetWidth;
    splitter.classList.add('dragging');
    document.body.style.cursor='col-resize';
    document.body.style.userSelect='none';
    e.preventDefault();
  });
  document.addEventListener('mousemove',e=>{
    if(!dragging)return;
    const delta=startX-e.clientX;
    const newW=Math.max(220,Math.min(560,startW+delta));
    colRight.style.width=newW+'px';
    resizeCanvas();
  });
  document.addEventListener('mouseup',()=>{
    if(!dragging)return;
    dragging=false;
    splitter.classList.remove('dragging');
    document.body.style.cursor='';
    document.body.style.userSelect='';
    resizeCanvas();
    if(imgPixels) drawHistogram();
  });
})();

// ─── RESIZE OBSERVER ─────────────────────────────────────────────────────
new ResizeObserver(()=>{
  resizeCanvas();
  if(imgPixels) drawHistogram();
}).observe(document.getElementById('canvasContainer'));

// ─── INIT ─────────────────────────────────────────────────────────────────
p5inst = new p5(sketch);
</script>
